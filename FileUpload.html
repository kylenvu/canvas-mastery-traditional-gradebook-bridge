<script>
  var traditionalGradebookRoster = null;
  var uploadModalInstance = null;
  var maxScoreModalInstance = null;

  // --- Upload Flow Functions ---
  function handleUploadClick() {
    if (!hasValidMaxScore()) {
      showMaxScoreModal();
      return;
    }

    showUploadModal();
  }

  function showUploadModal() {
    var uploadModal = document.getElementById("upload-modal");
    uploadModalInstance = bootstrap.Modal.getOrCreateInstance(uploadModal);
    uploadModalInstance.show();
  }

  function showMaxScoreModal() {
    var maxScoreModal = document.getElementById("max-score-modal");
    var modalInput = document.getElementById("max-score-modal-input");
    var mainInput = document.getElementById("max-score-input");

    modalInput.value = mainInput.value || "";
    clearMaxScoreModalError();
    maxScoreModalInstance = bootstrap.Modal.getOrCreateInstance(maxScoreModal);
    maxScoreModalInstance.show();

    maxScoreModal.addEventListener("shown.bs.modal", function focusMaxScoreInput() {
      modalInput.focus();
      maxScoreModal.removeEventListener("shown.bs.modal", focusMaxScoreInput);
    });
  }

  document.addEventListener("DOMContentLoaded", function() {
    var modalInput = document.getElementById("max-score-modal-input");
    if (!modalInput) {
      return;
    }

    modalInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        saveMaxScoreAndContinue();
      }
    });

    modalInput.addEventListener("input", clearMaxScoreModalError);
  });

  function saveMaxScoreAndContinue() {
    var modalInput = document.getElementById("max-score-modal-input");
    var scoreVal = parseInt(modalInput.value, 10);

    if (isNaN(scoreVal) || scoreVal <= 0 || String(scoreVal) !== modalInput.value.trim()) {
      showMaxScoreModalError();
      return;
    }

    document.getElementById("max-score-input").value = scoreVal;

    if (maxScoreModalInstance) {
      maxScoreModalInstance.hide();
    }

    showUploadModal();
  }

  function hasValidMaxScore() {
    var maxScoreField = document.getElementById("max-score-input");
    var scoreVal = parseInt(maxScoreField.value, 10);

    return maxScoreField.value.trim() !== "" && !isNaN(scoreVal) && scoreVal > 0 && String(scoreVal) === maxScoreField.value.trim();
  }

  function showMaxScoreModalError() {
    document.getElementById("max-score-modal-error").classList.remove("d-none");
  }

  function clearMaxScoreModalError() {
    document.getElementById("max-score-modal-error").classList.add("d-none");
  }

  function triggerTraditionalGradebookSelect() {
    var fileInput = document.getElementById("traditional-file-input");
    fileInput.click();
  }

  function triggerMasteryGradebookSelect() {
    var fileInput = document.getElementById("mastery-file-input");
    fileInput.click();
  }

  function handleTraditionalFileSelected(event) {
    var file = event.target.files[0];
    if (!validateCsvFile(file, event.target)) {
      return;
    }

    setUploadStatus("traditional-upload-status", "Reading " + file.name + "...");
    readCsvFile(file, function(csvText) {
      setUploadStatus("traditional-upload-status", "Processing traditional gradebook export...");

      google.script.run
        .withSuccessHandler(function(parsedRoster) {
          handleTraditionalGradebookParsed(parsedRoster);
        })
        .withFailureHandler(function(error) {
          console.error("Traditional gradebook parsing failed:", error);
          setUploadStatus("traditional-upload-status", "The traditional gradebook export could not be parsed.", true);
        })
        .parseTraditionalGradebookCsv(csvText);
    }, function() {
      setUploadStatus("traditional-upload-status", "The selected file could not be read.", true);
    });
  }

  function handleMasteryFileSelected(event) {
    var file = event.target.files[0];
    if (!validateCsvFile(file, event.target)) {
      return;
    }

    setUploadStatus("mastery-upload-status", "Reading " + file.name + "...");
    renderGradesLoading("Reading mastery CSV file...");

    readCsvFile(file, function(csvText) {
      setUploadStatus("mastery-upload-status", "Processing mastery gradebook export...");
      renderGradesLoading("Parsing mastery CSV file...");

      google.script.run
        .withSuccessHandler(function(parsedGrades) {
          renderParsedGrades(parsedGrades);
          setUploadStatus("mastery-upload-status", "Mastery gradebook processed.");
          if (uploadModalInstance) {
            uploadModalInstance.hide();
          }
        })
        .withFailureHandler(function(error) {
          console.error("Mastery gradebook parsing failed:", error);
          setUploadStatus("mastery-upload-status", "The mastery gradebook export could not be parsed.", true);
          renderGradesMessage("The selected mastery CSV could not be parsed. Please check the file and try again.");
        })
        .parseGradeCsv(csvText, traditionalGradebookRoster);
    }, function() {
      setUploadStatus("mastery-upload-status", "The selected file could not be read.", true);
      renderGradesMessage("The selected file could not be read. Please try again.");
    });
  }

  function handleTraditionalGradebookParsed(parsedRoster) {
    if (!parsedRoster || parsedRoster.error) {
      setUploadStatus("traditional-upload-status", parsedRoster ? parsedRoster.error : "No roster data was returned.", true);
      return;
    }

    traditionalGradebookRoster = parsedRoster.students || [];
    setUploadStatus("traditional-upload-status", traditionalGradebookRoster.length + " students processed.");
    setUploadStatus("mastery-upload-status", "Ready for mastery gradebook export.");
    document.getElementById("mastery-upload-button").disabled = false;
    document.getElementById("mastery-upload-step").classList.remove("upload-step-disabled");
    renderGradesMessage("Traditional gradebook processed. Upload the mastery gradebook export to display assignment scores.");
  }

  function validateCsvFile(file, input) {
    if (!file) {
      return false;
    }

    if (!file.name.toLowerCase().endsWith(".csv")) {
      input.value = "";
      setUploadStatus(input.id === "traditional-file-input" ? "traditional-upload-status" : "mastery-upload-status", "Please select a valid .csv file.", true);
      return false;
    }

    return true;
  }

  function readCsvFile(file, successCallback, errorCallback) {
    var reader = new FileReader();
    reader.onload = function(loadEvent) {
      successCallback(loadEvent.target.result);
    };
    reader.onerror = errorCallback;
    reader.readAsText(file);
  }

  function setUploadStatus(elementId, message, isError) {
    var status = document.getElementById(elementId);
    status.textContent = message;
    status.classList.toggle("text-danger", !!isError);
    status.classList.toggle("text-success", !isError && message.indexOf("processed") !== -1);
  }
</script>
