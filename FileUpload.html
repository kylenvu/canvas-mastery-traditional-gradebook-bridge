<script>
  // --- Upload Flow Functions ---
  function handleUploadClick() {
    var maxScoreField = document.getElementById("max-score-input");

    // Check if the max score field is empty
    if (!maxScoreField.value || maxScoreField.value.trim() === "") {
      var userInput = prompt("Please enter a max score per outcome (positive integer greater than 0):");

      // User cancelled prompt
      if (userInput === null) {
        return;
      }

      var scoreVal = parseInt(userInput, 10);

      // Validate that input is a positive integer greater than 0
      if (isNaN(scoreVal) || scoreVal <= 0) {
        alert("Invalid score entered. Please enter an integer greater than 0.");
        return;
      }

      // Populate field with the validated score
      maxScoreField.value = scoreVal;
    }

    // Wrap the file select call in a timeout to yield control back to the event loop
    // so the browser can focus properly after closing the prompt dialog.
    setTimeout(function() {
      triggerFileSelect();
    }, 50);
  }

  function triggerFileSelect() {
    var fileInput = document.getElementById("file-input");
    fileInput.click();
  }

  function handleFileSelected(event) {
    var file = event.target.files[0];
    if (file) {
      // Basic extension validation
      if (!file.name.toLowerCase().endsWith('.csv')) {
        alert("Please select a valid .csv file.");
        event.target.value = ''; // Reset input
        return;
      }

      console.log("File ready to upload:", file.name);
      renderGradesLoading("Reading CSV file...");

      var reader = new FileReader();
      reader.onload = function(loadEvent) {
        renderGradesLoading("Parsing CSV file...");

        google.script.run
          .withSuccessHandler(function(parsedGrades) {
            renderParsedGrades(parsedGrades);
          })
          .withFailureHandler(function(error) {
            console.error("CSV parsing failed:", error);
            renderGradesMessage("The selected CSV could not be parsed. Please check the file and try again.");
          })
          .parseGradeCsv(loadEvent.target.result);
      };
      reader.onerror = function() {
        alert("The selected file could not be read. Please try again.");
        renderGradesMessage("The selected file could not be read. Please try again.");
      };
      reader.readAsText(file);
    }
  }
</script>
